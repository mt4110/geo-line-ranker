name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test DB-free packages
        run: |
          cargo test \
            -p api-contracts \
            -p cache \
            -p compatibility-tests \
            -p config \
            -p crawler-core \
            -p domain \
            -p generic-csv \
            -p generic-http \
            -p geo \
            -p jp-postal \
            -p jp-rail \
            -p jp-school \
            -p observability \
            -p openapi \
            -p ranking \
            -p storage \
            -p storage-opensearch \
            -p test-support \
            -p worker-core

  rust-postgres-tests:
    name: rust-postgres-tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: api
            packages: "-p api"
          - shard: cli
            packages: "-p cli"
          - shard: crawler
            packages: "-p crawler"
          - shard: worker-storage
            packages: "-p worker -p storage-postgres"
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geo_line_ranker
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geo_line_ranker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/geo_line_ranker
      REDIS_URL: redis://127.0.0.1:6379
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test ${{ matrix.shard }}
        run: cargo test ${{ matrix.packages }}

  mvp-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Public MVP acceptance
        run: ./scripts/mvp_acceptance.sh
