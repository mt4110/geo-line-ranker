name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Config, manifest, and fixture lint
        run: |
          cargo run -p cli -- config lint
          cargo run -p cli -- source-manifest lint
          cargo run -p cli -- fixtures doctor --path storage/fixtures/minimal
          cargo run -p cli -- fixtures doctor --path storage/fixtures/demo_jp
          cargo run -p crawler -- manifest lint
      - name: Local review evaluation self-test
        run: python3 scripts/local_review_eval.py --self-test

  openapi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: OpenAPI drift
        run: ./scripts/openapi_drift_check.sh

  node-and-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            packages/ts-sdk/package-lock.json
            examples/frontend-next/package-lock.json
      - name: TypeScript SDK build
        run: ./scripts/ts_sdk_check.sh
      - name: Example frontend smoke
        run: ./scripts/frontend_smoke.sh

  rust-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test DB-free packages
        run: |
          cargo test \
            -p api-contracts \
            -p cache \
            -p compatibility-tests \
            -p config \
            -p crawler-core \
            -p domain \
            -p generic-csv \
            -p generic-http \
            -p geo \
            -p jp-postal \
            -p jp-rail \
            -p jp-school \
            -p observability \
            -p openapi \
            -p ranking \
            -p storage \
            -p storage-opensearch \
            -p test-support \
            -p worker-core

  rust-postgres-tests:
    name: rust-postgres-tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: api
            packages: "-p api"
          - shard: cli
            packages: "-p cli"
          - shard: crawler
            packages: "-p crawler"
          - shard: worker-storage
            packages: "-p worker -p storage-postgres"
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geo_line_ranker
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geo_line_ranker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/geo_line_ranker
      REDIS_URL: redis://127.0.0.1:6379
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test ${{ matrix.shard }}
        run: cargo test ${{ matrix.packages }}

  mvp-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check MVP acceptance runner
        run: |
          test -x scripts/mvp_acceptance.sh
          test -x scripts/data_quality_doctor.sh
          test -x scripts/release_readiness.sh
          test -x scripts/post_mvp_hardening.sh
          test -x scripts/optional_evidence_review.sh
          bash -n scripts/mvp_acceptance.sh
          bash -n scripts/data_quality_doctor.sh
          bash -n scripts/release_readiness.sh
          bash -n scripts/post_mvp_hardening.sh
          bash -n scripts/optional_evidence_review.sh
      - name: Public MVP acceptance
        run: ./scripts/mvp_acceptance.sh

  data-quality-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geo_line_ranker
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geo_line_ranker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5433/geo_line_ranker
      REDIS_URL: redis://127.0.0.1:6379
      RANKING_CONFIG_DIR: configs/ranking
      FIXTURE_DIR: storage/fixtures/minimal
      RAW_STORAGE_DIR: .storage/raw
      CANDIDATE_RETRIEVAL_MODE: sql_only
      DATA_QUALITY_FAIL_ON_WARNING: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Wait for PostgreSQL
        run: |
          deadline=$((SECONDS + 90))
          until psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atqc "SELECT NOT pg_is_in_recovery();" | grep -qx t; do
            if (( SECONDS >= deadline )); then
              echo "timed out waiting for PostgreSQL" >&2
              exit 1
            fi
            sleep 1
          done
      - name: Bootstrap data quality baseline
        run: |
          cargo run -p cli -- migrate
          cargo run -p cli -- seed example
          cargo run -p cli -- snapshot refresh
      - name: Read-only data quality doctor
        run: ./scripts/data_quality_doctor.sh
