name: docs

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Dump OpenAPI
        run: |
          cargo run -p cli -- dump-openapi
          git diff --exit-code -- schemas/openapi.json
      - name: Check docs files
        run: |
          test -f README.md
          test -f README_EN.md
          test -f docs/QUICKSTART.md
          test -f docs/ARCHITECTURE.md
          test -f docs/MVP_ACCEPTANCE.md
          test -f docs/PUBLIC_MVP_RELEASE_READINESS.md
          test -f docs/OPERATIONS.md
          test -f docs/OPERATOR_FEEDBACK_LOOP.md
          test -f docs/PHASE11_REGRESSION_EVIDENCE.md
