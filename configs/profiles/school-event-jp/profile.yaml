schema_version: 2
kind: profile_pack
manifest_version: 1
profile_id: school-event-jp
display_name: School Event JP Reference
compatibility_level: reference
default_locale: ja-JP
description: Reference profile for deterministic JP school and event discovery.
content_kinds:
  - school
  - event
supported_content_kinds:
  - school
  - event
context_inputs:
  - station
  - line
  - area
  - user_profile
placements:
  - home
  - search
  - detail
  - mypage
fallback_policy: school_event_jp_default
ranking_config_dir: ../../ranking
reason_catalog:
  locale_files:
    ja-JP: reasons.yaml
article_support: reserved
fixtures:
  - fixture_set_id: demo_jp
    path: ../../../storage/fixtures/demo_jp
connectors:
  - type: source_manifest
    manifest: ../../../storage/sources/jp_rail/example.yaml
  - type: source_manifest
    manifest: ../../../storage/sources/jp_postal/example.yaml
  - type: source_manifest
    manifest: ../../../storage/sources/jp_school/example.yaml
  - type: source_manifest
    manifest: ../../../storage/sources/jp_school_geo/example.yaml
  - type: csv_import
    manifest: ../../../examples/import/events.sample.csv
    source_id: event-csv
    field_mapping: event_v1
  - type: ndjson_import
    manifest: ../../../examples/import/events.sample.ndjson
    source_id: event-ndjson
    field_mapping: event_v1
  - type: crawler_manifest
    manifest: ../../../configs/crawler/sources/custom_example.yaml
evaluation:
  scenario_pack: ../../evaluation/scenarios
source_manifests:
  - ../../../storage/sources/jp_rail/example.yaml
  - ../../../storage/sources/jp_postal/example.yaml
  - ../../../storage/sources/jp_school/example.yaml
  - ../../../storage/sources/jp_school_geo/example.yaml
event_csv_examples:
  - ../../../examples/import/events.sample.csv
optional_crawler_manifests:
  - ../../../configs/crawler/sources/custom_example.yaml
examples:
  - ../../../examples/school-event-jp/README.md
