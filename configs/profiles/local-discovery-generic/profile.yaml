schema_version: 2
kind: profile_pack
manifest_version: 1
profile_id: local-discovery-generic
display_name: Local Discovery Generic
compatibility_level: stable
default_locale: ja-JP
description: Small deterministic local-discovery profile backed only by committed minimal fixtures.
content_kinds:
  - school
  - event
supported_content_kinds:
  - school
  - event
context_inputs:
  - station
  - line
  - area
placements:
  - home
  - search
  - detail
  - mypage
fallback_policy: geo_line_default
ranking_config_dir: ../../ranking
reason_catalog:
  locale_files:
    ja-JP: reasons.yaml
article_support: reserved
fixtures:
  - fixture_set_id: minimal
    path: ../../../storage/fixtures/minimal
connectors:
  - type: csv_import
    manifest: ../../../examples/import/events.sample.csv
    source_id: event-csv
    field_mapping: event_v1
  - type: ndjson_import
    manifest: ../../../examples/import/events.sample.ndjson
    source_id: event-ndjson
    field_mapping: event_v1
evaluation:
  scenario_pack: ../../evaluation/scenarios
examples:
  - ../../../examples/local-discovery-generic/README.md
