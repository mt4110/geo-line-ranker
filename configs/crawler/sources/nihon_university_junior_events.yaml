  event_category: admission_event
  is_open_day: false
  is_featured: false
  priority_weight: 0.15
  placement_tags:
    - search
    - detail
targets:
  - logical_name: junior_info_session_page
    url: https://www.yokohama.hs.nihon-u.ac.jp/junior/info-session/
