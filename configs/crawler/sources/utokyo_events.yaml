schema_version: 1
kind: crawler_source
source_id: utokyo-events
source_name: University of Tokyo events feed
source_maturity: live_ready
parser_key: utokyo_events_json_v1
expected_shape: json_feed
description: Real-domain allowlist crawler manifest for the University of Tokyo public events JSON feed.
allowlist:
  allowed_domains:
    - www.u-tokyo.ac.jp
  user_agent: geo-line-ranker-crawler/0.1 (+https://github.com/mt4110/geo-line-ranker)
  min_fetch_interval_ms: 1000
  robots_txt_url: https://www.u-tokyo.ac.jp/robots.txt
  terms_url: https://www.u-tokyo.ac.jp/ja/general/policy.html
  terms_note: Manual review required before production use. Privacy policy is published at https://www.u-tokyo.ac.jp/ja/general/privacy_policy.html.
defaults:
  school_id: school_utokyo
  event_category: general
  is_open_day: false
  is_featured: false
  priority_weight: 0.1
  placement_tags:
    - search
    - detail
targets:
  - logical_name: focus_events_json
    url: https://www.u-tokyo.ac.jp/focus/ja/events/events.json
