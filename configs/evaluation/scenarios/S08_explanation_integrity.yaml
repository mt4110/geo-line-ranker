schema_version: 1
kind: replay_scenario
id: S08_EXPLANATION_INTEGRITY
title: Explanation integrity for line recommendation
description: A line-driven recommendation must expose the line reason only when the line feature contributed.
tags:
  - v0.3.1
  - explanation_integrity
  - line_context
query:
  target_station_id: st_line_explain_seed
  limit: 2
  placement: search
  debug: false
  context:
    context_source: request_line
    confidence: 0.95
    line:
      line_name: JR Chuo Line
    privacy_level: coarse_area
    fallback_policy: school_event_jp_default
    gate_policy: geo_line_default
    warnings: []
dataset:
  schools:
    - id: school_chuo_near
      name: Chuo Near High
      area: Suginami
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_chuo_near
    - id: school_chuo_far
      name: Chuo Far High
      area: Mitaka
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_chuo_far
    - id: school_other_line
      name: Other Line High
      area: Taito
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_other_line
  events: []
  stations:
    - id: st_line_explain_seed
      name: Ogikubo
      line_name: JR Chuo Line
      latitude: 35.7040
      longitude: 139.6199
    - id: st_chuo_near
      name: Nishi-Ogikubo
      line_name: JR Chuo Line
      latitude: 35.7038
      longitude: 139.5996
    - id: st_chuo_far
      name: Mitaka
      line_name: JR Chuo Line
      latitude: 35.7027
      longitude: 139.5608
    - id: st_other_line
      name: Ueno
      line_name: JR Yamanote Line
      latitude: 35.7138
      longitude: 139.7770
  school_station_links:
    - school_id: school_chuo_near
      station_id: st_chuo_near
      walking_minutes: 6
      distance_meters: 520
      hop_distance: 1
      line_name: JR Chuo Line
    - school_id: school_chuo_far
      station_id: st_chuo_far
      walking_minutes: 10
      distance_meters: 900
      hop_distance: 3
      line_name: JR Chuo Line
    - school_id: school_other_line
      station_id: st_other_line
      walking_minutes: 3
      distance_meters: 250
      hop_distance: 0
      line_name: JR Yamanote Line
  popularity_snapshots:
    - school_id: school_other_line
      popularity_score: 50.0
      total_events: 50
      school_view_count: 50
      school_save_count: 0
      event_view_count: 0
      apply_click_count: 0
      share_count: 0
      search_execute_count: 0
  user_affinity_snapshots: []
  area_affinity_snapshots: []
expectations:
  fallback_stage: same_line
  ordered:
    - "school:school_chuo_near"
    - "school:school_chuo_far"
  pairwise:
    - higher: "school:school_chuo_near"
      lower: "school:school_chuo_far"
      note: closer same-line result should keep the explanation tied to contributed line and geo features
  absent_from_result:
    - "school:school_other_line"
  candidate_counts:
    strict_station: 0
    same_line: 2
    same_city: 0
    same_prefecture: 0
    safe_global_popular: 3
  required_reason_codes:
    "school:school_chuo_near":
      - geo.line_match
      - geo.station_distance
      - geo.walking_minutes
