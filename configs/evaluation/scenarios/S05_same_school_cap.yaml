    - "school:school_balanced"
  absent_from_result:
    - "event:event_flood_open_b"
    - "school:school_event_flood"
  max_items_per_school: 1
  candidate_counts:
    strict_station: 2
    same_line: 2
    same_city: 0
    same_prefecture: 0
    safe_global_popular: 2
  required_reason_codes:
