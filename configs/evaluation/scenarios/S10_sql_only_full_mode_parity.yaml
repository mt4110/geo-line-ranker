  area_affinity_snapshots: []
expectations:
  fallback_stage: same_line
  ordered:
    - "school:school_parity_direct"
    - "school:school_parity_near"
    - "school:school_parity_far"
  pairwise:
    - higher: "school:school_parity_direct"
      lower: "school:school_parity_near"
      note: direct same-line candidate should stay ahead of nearby same-line candidates
    - higher: "school:school_parity_near"
      lower: "school:school_parity_far"
      note: same-line candidates should remain distance ordered within the deterministic slice
  absent_from_result:
    - "school:school_parity_remote_popular"
  candidate_counts:
    strict_station: 0
    same_line: 3
    same_city: 0
    same_prefecture: 0
    safe_global_popular: 4
  required_reason_codes:
    "school:school_parity_direct":
      - geo.direct_station
      - geo.line_match
      - geo.station_distance
