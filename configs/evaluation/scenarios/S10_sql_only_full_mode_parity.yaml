schema_version: 1
kind: replay_scenario
id: S10_SQL_ONLY_FULL_MODE_PARITY
title: Shared retrieval-slice ordering contract
description: A DB-free proxy fixes the shared candidate-slice ordering that SQL-only and optional full-mode retrieval must preserve before ranking.
tags:
  - v0.3.1
  - retrieval_parity
  - sql_only
  - full_mode_optional
query:
  target_station_id: st_parity_seed
  limit: 3
  placement: search
  debug: false
  context:
    context_source: request_line
    confidence: 0.95
    line:
      line_name: Parity Line
    privacy_level: coarse_area
    fallback_policy: school_event_jp_default
    gate_policy: geo_line_default
    warnings: []
dataset:
  schools:
