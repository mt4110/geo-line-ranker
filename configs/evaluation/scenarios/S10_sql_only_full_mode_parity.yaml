      area: Naha
      prefecture_name: Okinawa
      school_type: high_school
      group_id: group_parity_remote
  events: []
  stations:
    - id: st_parity_seed
      name: Parity Seed
      line_name: Parity Line
      latitude: 35.6500
      longitude: 139.7500
    - id: st_parity_near
      name: Parity Near
      line_name: Parity Line
      latitude: 35.6540
      longitude: 139.7540
    - id: st_parity_far
      name: Parity Far
      line_name: Parity Line
      latitude: 35.6660
      longitude: 139.7660
    - id: st_parity_remote
      name: Parity Remote
      line_name: Remote Line
      latitude: 26.2124
      longitude: 127.6792
