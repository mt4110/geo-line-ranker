schema_version: 1
kind: replay_scenario
id: S02_LINE_INTENT
title: Explicit line intent
description: A Yamanote line request should select same-line candidates before remote popular schools.
tags:
  - v0.3.1
  - line_context
  - pairwise
query:
  target_station_id: st_yamanote_seed
  limit: 3
  placement: search
  debug: false
  context:
    context_source: request_line
    confidence: 0.95
    line:
      line_name: JR Yamanote Line
    privacy_level: coarse_area
    fallback_policy: school_event_jp_default
    gate_policy: geo_line_default
    warnings: []
dataset:
  schools:
    - id: school_yamanote_near
      name: Yamanote Near High
      area: Minato
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_yamanote_near
    - id: school_yamanote_far
      name: Yamanote Far High
      area: Minato
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_yamanote_far
    - id: school_remote_popular
      name: Remote Popular High
      area: Koto
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_remote_popular
  events: []
  stations:
    - id: st_yamanote_seed
      name: Tamachi
      line_name: JR Yamanote Line
      latitude: 35.6457
      longitude: 139.7476
    - id: st_hamamatsucho
      name: Hamamatsucho
      line_name: JR Yamanote Line
      latitude: 35.6556
      longitude: 139.7571
    - id: st_shinbashi
      name: Shinbashi
      line_name: JR Yamanote Line
      latitude: 35.6663
      longitude: 139.7587
    - id: st_toyosu
      name: Toyosu
      line_name: Tokyo Metro Yurakucho Line
      latitude: 35.6546
      longitude: 139.7967
  school_station_links:
    - school_id: school_yamanote_near
      station_id: st_hamamatsucho
      walking_minutes: 6
      distance_meters: 520
      hop_distance: 1
      line_name: JR Yamanote Line
    - school_id: school_yamanote_far
      station_id: st_shinbashi
      walking_minutes: 9
      distance_meters: 920
      hop_distance: 2
      line_name: JR Yamanote Line
    - school_id: school_remote_popular
      station_id: st_toyosu
      walking_minutes: 3
      distance_meters: 250
      hop_distance: 0
      line_name: Tokyo Metro Yurakucho Line
  popularity_snapshots:
    - school_id: school_remote_popular
      popularity_score: 30.0
      total_events: 30
      school_view_count: 30
      school_save_count: 0
      event_view_count: 0
      apply_click_count: 0
      share_count: 0
      search_execute_count: 0
  user_affinity_snapshots: []
  area_affinity_snapshots: []
expectations:
  fallback_stage: same_line
  ordered:
    - "school:school_yamanote_near"
    - "school:school_yamanote_far"
  pairwise:
    - higher: "school:school_yamanote_near"
      lower: "school:school_yamanote_far"
      note: closer same-line candidate should sort first
  absent_from_result:
    - "school:school_remote_popular"
  candidate_counts:
    same_line: 2
    safe_global_popular: 3
  required_reason_codes:
    "school:school_yamanote_near":
      - geo.line_match
      - geo.walking_minutes
