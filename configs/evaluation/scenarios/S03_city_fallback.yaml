schema_version: 1
kind: replay_scenario
id: S03_CITY_FALLBACK
title: City fallback ordering
description: Area-only city context should fall back to same-city candidates with deterministic ordering.
tags:
  - v0.3.1
  - city_context
  - pairwise
query:
  target_station_id: st_city_seed
  limit: 3
  placement: search
  debug: false
  context:
    context_source: request_area
    confidence: 0.95
    area:
      country: JP
      prefecture_name: Tokyo
      city_name: Minato
    privacy_level: coarse_area
    fallback_policy: school_event_jp_default
    gate_policy: geo_line_default
    warnings: []
dataset:
  schools:
    - id: school_minato_near
      name: Minato Near High
      area: Minato
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_minato_near
    - id: school_minato_far
      name: Minato Far High
      area: Minato
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_minato_far
    - id: school_shibuya_popular
      name: Shibuya Popular High
      area: Shibuya
      prefecture_name: Tokyo
      school_type: high_school
      group_id: group_shibuya_popular
  events: []
  stations:
    - id: st_city_seed
      name: City Seed
      line_name: Isolated Seed Line
      latitude: 35.6500
      longitude: 139.7500
    - id: st_minato_near
      name: Minato Near
      line_name: Tokyo Metro Namboku Line
      latitude: 35.6520
      longitude: 139.7520
    - id: st_minato_far
      name: Minato Far
      line_name: Toei Mita Line
      latitude: 35.6580
      longitude: 139.7600
    - id: st_shibuya
      name: Shibuya
      line_name: JR Yamanote Line
      latitude: 35.6580
      longitude: 139.7016
  school_station_links:
    - school_id: school_minato_near
      station_id: st_minato_near
      walking_minutes: 5
      distance_meters: 420
      hop_distance: 0
      line_name: Tokyo Metro Namboku Line
    - school_id: school_minato_far
      station_id: st_minato_far
      walking_minutes: 12
      distance_meters: 980
      hop_distance: 0
      line_name: Toei Mita Line
    - school_id: school_shibuya_popular
      station_id: st_shibuya
      walking_minutes: 4
      distance_meters: 350
      hop_distance: 0
      line_name: JR Yamanote Line
  popularity_snapshots:
    - school_id: school_shibuya_popular
      popularity_score: 40.0
      total_events: 40
      school_view_count: 40
      school_save_count: 0
      event_view_count: 0
      apply_click_count: 0
      share_count: 0
      search_execute_count: 0
  user_affinity_snapshots: []
  area_affinity_snapshots: []
expectations:
  fallback_stage: same_city
  ordered:
    - "school:school_minato_near"
    - "school:school_minato_far"
  pairwise:
    - higher: "school:school_minato_near"
      lower: "school:school_minato_far"
      note: closer same-city candidate should sort first
  absent_from_result:
    - "school:school_shibuya_popular"
  candidate_counts:
    same_city: 2
    same_prefecture: 3
    safe_global_popular: 3
  required_reason_codes:
    "school:school_minato_near":
      - geo.station_distance
      - geo.walking_minutes
