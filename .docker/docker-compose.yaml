services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geo_line_ranker
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geo_line_ranker"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  api:
    build:
      context: ..
      dockerfile: .docker/api.Dockerfile
    environment:
      APP_BIND_ADDR: 0.0.0.0:4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/geo_line_ranker
      REDIS_URL: redis://redis:6379
      RANKING_CONFIG_DIR: configs/ranking
      FIXTURE_DIR: storage/fixtures/minimal
      ALGORITHM_VERSION: ${ALGORITHM_VERSION:-phase7-search-signal-v2}
      CANDIDATE_RETRIEVAL_MODE: sql_only
      CANDIDATE_RETRIEVAL_LIMIT: 256
      POSTGRES_POOL_MAX_SIZE: ${POSTGRES_POOL_MAX_SIZE:-16}
      RECOMMENDATION_CACHE_TTL_SECS: 120
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ["minimal"]

  worker:
    build:
      context: ..
      dockerfile: .docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/geo_line_ranker
      REDIS_URL: redis://redis:6379
      CANDIDATE_RETRIEVAL_MODE: sql_only
      POSTGRES_POOL_MAX_SIZE: ${POSTGRES_POOL_MAX_SIZE:-16}
      WORKER_POLL_INTERVAL_MS: 1000
      WORKER_RETRY_DELAY_SECS: 5
      WORKER_MAX_ATTEMPTS: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ["minimal"]

  frontend:
    build:
      context: ..
      dockerfile: .docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:4000}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles: ["minimal"]

volumes:
  postgres_data:
