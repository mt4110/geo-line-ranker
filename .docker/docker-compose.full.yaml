services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geo_line_ranker
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geo_line_ranker"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ..
      dockerfile: .docker/api.Dockerfile
    environment:
      APP_BIND_ADDR: 0.0.0.0:4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/geo_line_ranker
      REDIS_URL: redis://redis:6379
      RANKING_CONFIG_DIR: configs/ranking
      FIXTURE_DIR: storage/fixtures/minimal
      ALGORITHM_VERSION: phase5-placement-mixed-ranking-v1
      CANDIDATE_RETRIEVAL_MODE: full
      CANDIDATE_RETRIEVAL_LIMIT: 256
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX_NAME: geo_line_ranker_candidates
      RECOMMENDATION_CACHE_TTL_SECS: 120
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    profiles: ["full"]

  worker:
    build:
      context: ..
      dockerfile: .docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/geo_line_ranker
      REDIS_URL: redis://redis:6379
      CANDIDATE_RETRIEVAL_MODE: full
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX_NAME: geo_line_ranker_candidates
      WORKER_POLL_INTERVAL_MS: 1000
      WORKER_RETRY_DELAY_SECS: 5
      WORKER_MAX_ATTEMPTS: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    profiles: ["full"]

  crawler:
    build:
      context: ..
      dockerfile: .docker/crawler.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/geo_line_ranker
      RAW_STORAGE_DIR: .storage/raw
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["full"]

  frontend:
    build:
      context: ..
      dockerfile: .docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
    profiles: ["full"]

volumes:
  postgres_data:
