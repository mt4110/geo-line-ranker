nextest-version = { required = "0.9.127", recommended = "0.9.133" }

[profile.default]
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "flaky"
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.postgres]
inherits = "default"
test-threads = 1
slow-timeout = { period = "120s", terminate-after = 3 }

[profile.ci]
inherits = "default"
junit.path = "target/nextest/ci/junit.xml"

[profile.ci-postgres]
inherits = "postgres"
junit.path = "target/nextest/ci-postgres/junit.xml"
